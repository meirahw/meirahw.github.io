<!DOCTYPE html>
<meta charset="utf-8">

<!-- Load d3.js -->
<script src="D3js_Script_ForTutorial.js"></script>
<script src="TutorialData.js"></script>

<!-- Create a div where the graph will take place -->
<div id="my_dataviz"></div>


<script>

// set the dimensions and margins of the graph
var margin = {top: 10, right: 30, bottom: 30, left: 60},
    width = 460 - margin.left - margin.right,
    height = 400 - margin.top - margin.bottom;

// append the svg object to the body of the page
var svg = d3.select("#my_dataviz")
  .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.top + margin.bottom)
  .append("g")
    .attr("transform",
          "translate(" + margin.left + "," + margin.top + ")");

// ✅ just assign data directly
var data = tutorialData;

// convert numbers (optional but good practice)
data.forEach(function(d) {
  d.poly_id = +d.poly_id;
  d.mean = +d.mean;
  d.p25 = +d.p25;
  d.p75 = +d.p75;
  d.npix = +d.npix;
});

// filter
data = data.filter(function(d) { return d.poly_id === 4; });


    // x axis as categorical years
  var x = d3.scalePoint()
    .domain(data.map(function(d) { return d.year; }))
    .range([0, width])
    .padding(0.5);

  svg.append("g")
    .attr("transform", "translate(0," + height + ")")
    .call(d3.axisBottom(x));

  // y axis based on p25 and p75 range
  var y = d3.scaleLinear()
    .domain([
      d3.min(data, function(d) { return d.p25; }),
      d3.max(data, function(d) { return d.p75; })
    ])
    .nice()
    .range([height, 0]);

  svg.append("g")
    .call(d3.axisLeft(y));

  // shaded ribbon = p25 to p75
  svg.append("path")
    .datum(data)
    .attr("fill", "#cce5df")
    .attr("stroke", "none")
    .attr("d", d3.area()
      .x(function(d) { return x(d.year); })
      .y0(function(d) { return y(d.p75); })
      .y1(function(d) { return y(d.p25); })
    );

  // mean line
  svg.append("path")
    .datum(data)
    .attr("fill", "none")
    .attr("stroke", "steelblue")
    .attr("stroke-width", 1.5)
    .attr("d", d3.line()
      .x(function(d) { return x(d.year); })
      .y(function(d) { return y(d.mean); })
    );

  // mean points
  svg.selectAll("circle")
    .data(data)
    .enter()
    .append("circle")
      .attr("cx", function(d) { return x(d.year); })
      .attr("cy", function(d) { return y(d.mean); })
      .attr("r", 4)
      .attr("fill", "steelblue");



</script>
